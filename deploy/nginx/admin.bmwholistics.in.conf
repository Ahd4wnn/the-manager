server {
    listen 80;
    server_name admin.bmwholistics.in;

    root /var/www/bmw/admin-web/dist;
    index index.html;

    location / {
        # SPA fallback so client-side routes resolve
        try_files $uri $uri/ /index.html;
    }

    # Cache built assets aggressively (hashed filenames)
    location /assets/ {
        expires 30d;
        add_header Cache-Control "public, immutable";
    }
}
